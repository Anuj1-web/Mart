<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Balaji Mega Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f6f8fb;
}

/* NAVBAR */
nav{
  background:#fff;
  padding:14px 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 2px 15px rgba(0,0,0,0.06);
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#0f2d4a;
}

.logo span{ color:#00a884; }

.search-box{
  flex:2;
  margin:0 10px;
  position:relative;
}

.search-box input{
  width:100%;
  padding:10px 40px 10px 15px;
  border-radius:25px;
  border:1px solid #ddd;
  outline:none;
}

.search-box i{
  position:absolute;
  right:12px;
  top:10px;
  color:#777;
}

.admin-btn{
  background:#0f2d4a;
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* HERO */
.hero{
  width:90%;
  margin:20px auto;
  background:linear-gradient(135deg,#0f2d4a,#1f4e79);
  padding:40px;
  border-radius:16px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.hero.hide{ display:none; }

.hero img{ width:250px; }

/* PRODUCTS */
.products{
  width:90%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  padding-bottom:60px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.card-content h3{
  font-size:13px;
}

.price{
  color:#00a884;
  font-weight:600;
  margin:5px 0;
}

/* BUTTON AREA */
.btn-area{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:5px;
}

/* ADD BUTTON */
.add-btn{
  width:100%;
  padding:7px;
  border:none;
  background:#0f2d4a;
  color:white;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

/* QTY CONTROLS */
.qty-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
}

.qty-box button{
  width:30px;
  height:28px;
  border:none;
  background:#0f2d4a;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.qty-box span{
  font-weight:600;
}

/* CART */
.cart-icon{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#ff8c42;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.cart-count{
  position:absolute;
  top:-4px;
  right:-4px;
  background:#0f2d4a;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:11px;
}

/* RESPONSIVE */
@media(max-width:1024px){
  .products{ grid-template-columns:repeat(3,1fr); }
}

@media(max-width:600px){
  nav{ flex-direction:column; gap:10px; }
  .search-box{ width:100%; }
  .admin-btn{ width:100%; }

  .hero{ flex-direction:column; text-align:center; }
  .hero img{ width:180px; }

  .products{ grid-template-columns:repeat(3,1fr); gap:10px; }

  .card img{ height:80px; }
  .card-content h3{ font-size:11px; }
  .price{ font-size:12px; }
}
</style>
</head>

<body>

<nav>
  <div class="logo">Balaji <span>Mega Mart</span></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
    <i class="fa fa-search"></i>
  </div>

  <button class="admin-btn" onclick="goAdmin()">Admin Login</button>
</nav>

<section class="hero" id="hero">
  <div>
    <h1>Fresh Groceries Delivered Fast</h1>
    <p>Order essentials at best prices</p>
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
</section>

<h2 style="width:90%;margin:20px auto;">Products</h2>

<section class="products" id="productContainer"></section>

<div class="cart-icon" onclick="goToCart()">
  <i class="fa fa-shopping-cart"></i>
  <div class="cart-count" id="cartCount">0</div>
</div>

<footer>
  Balaji Mega Mart
</footer>

<script>

/* PRODUCTS FROM ADMIN */
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("productContainer");
const hero = document.getElementById("hero");

/* GET QTY */
function getQty(id){
  let item = cart.find(p=>p.id===id);
  return item ? item.qty : 0;
}

/* ADD */
function addToCart(id){
  let item = products.find(p=>p.id===id);
  let existing = cart.find(p=>p.id===id);

  if(existing){
    existing.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  display(products);
  updateCart();
}

/* INCREASE */
function inc(id){
  let item = cart.find(p=>p.id===id);
  if(item){
    item.qty++;
    save();
  }
}

/* DECREASE */
function dec(id){
  let item = cart.find(p=>p.id===id);
  if(item){
    item.qty--;
    if(item.qty <= 0){
      cart = cart.filter(p=>p.id!==id);
    }
    save();
  }
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  display(products);
  updateCart();
}

/* DISPLAY */
function display(items){
  container.innerHTML="";

  if(items.length === 0){
    container.innerHTML = "<p style='padding:20px;'>No products added by admin yet</p>";
    return;
  }

  items.forEach(p=>{

    let qty = getQty(p.id);

    container.innerHTML += `
    <div class="card">
      <img src="${p.image}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>

        <div class="btn-area">
          ${
            qty === 0
            ? `<button class="add-btn" onclick="addToCart(${p.id})">Add</button>`
            : `
              <div class="qty-box">
                <button onclick="dec(${p.id})">-</button>
                <span>${qty}</span>
                <button onclick="inc(${p.id})">+</button>
              </div>
            `
          }
        </div>

      </div>
    </div>`;
  });
}

/* CART COUNT */
function updateCart(){
  let total = cart.reduce((sum,i)=>sum+i.qty,0);
  document.getElementById("cartCount").innerText = total;
}

updateCart();
display(products);

/* NAV */
function goToCart(){
  window.location.href="carts.html";
}

function goAdmin(){
  window.location.href="login.html";
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",function(){

  let val=this.value.toLowerCase();
  let filtered = products.filter(p=>p.name.toLowerCase().includes(val));

  display(filtered);

  if(val.length>0){
    hero.classList.add("hide");
  }else{
    hero.classList.remove("hide");
  }
});

</script>

</body>
</html>
