<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Balaji Mega Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f4f6fb;
}

/* ================= HEADER (UPGRADED) ================= */
nav{
  background:linear-gradient(90deg,#ffffff,#f8fbff);
  padding:12px 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
  border-bottom:1px solid #eef2f7;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:#0f2d4a;
  letter-spacing:0.3px;
}

.logo span{
  color:#00a884;
}

.search-box{
  flex:1;
  min-width:180px;
  position:relative;
}

.search-box input{
  width:100%;
  padding:10px 40px 10px 14px;
  border-radius:25px;
  border:1px solid #e6eaf0;
  outline:none;
  background:#fff;
  transition:0.2s;
}

.search-box input:focus{
  border-color:#00a884;
  box-shadow:0 0 0 3px rgba(0,168,132,0.1);
}

.search-box i{
  position:absolute;
  right:12px;
  top:11px;
  color:#888;
}

.admin-btn{
  background:linear-gradient(135deg,#0f2d4a,#1f4e79);
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;
}

.admin-btn:hover{
  transform:scale(1.03);
}

/* ================= HERO ================= */
.hero{
  width:92%;
  margin:18px auto;
  background:linear-gradient(135deg,#0f2d4a,#1f4e79);
  padding:28px;
  border-radius:18px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.hero.hide{ display:none; }

.hero img{
  width:220px;
}

/* ================= PRODUCTS ================= */
.products{
  width:92%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  padding-bottom:80px;
}

/* CARD (BLINKIT STYLE) */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.card-content h3{
  font-size:13px;
  font-weight:600;
  color:#222;
  line-height:1.2;
}

.price{
  color:#00a884;
  font-weight:700;
  margin:5px 0;
  font-size:13px;
}

/* BUTTON AREA */
.btn-area{
  margin-top:5px;
}

/* ADD BUTTON */
.add-btn{
  width:100%;
  padding:8px;
  border:none;
  background:#0f2d4a;
  color:white;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

.add-btn:active{
  transform:scale(0.96);
}

/* QTY */
.qty-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  background:#f2f6ff;
  border-radius:8px;
  padding:2px;
}

.qty-box button{
  width:28px;
  height:28px;
  border:none;
  background:#0f2d4a;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.qty-box span{
  font-weight:600;
  font-size:13px;
}

/* CART */
.cart-icon{
  position:fixed;
  bottom:18px;
  right:18px;
  width:58px;
  height:58px;
  background:#ff8c42;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  box-shadow:0 10px 25px rgba(255,140,66,0.3);
}

.cart-count{
  position:absolute;
  top:-4px;
  right:-4px;
  background:#0f2d4a;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:11px;
}

/* ================= FOOTER ================= */
footer{
  background:#0f2d4a;
  color:white;
  padding:35px 20px;
  text-align:center;
  border-top:3px solid #00a884;
}

/* ================= RESPONSIVE ================= */

/* tablet */
@media(max-width:1024px){
  .products{ grid-template-columns:repeat(3,1fr); }
}

/* mobile (3 columns optimized) */
@media(max-width:600px){

  nav{
    flex-direction:column;
    align-items:stretch;
  }

  .search-box{
    width:100%;
  }

  .admin-btn{
    width:100%;
  }

  .hero{
    flex-direction:column;
    text-align:center;
    padding:20px;
  }

  .hero img{
    width:160px;
    margin-top:10px;
  }

  .products{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }

  .card img{
    height:85px;
  }

  .card-content h3{
    font-size:11px;
  }

  .price{
    font-size:12px;
  }

  .add-btn{
    font-size:11px;
    padding:7px;
  }

  .qty-box button{
    width:26px;
    height:26px;
  }

  .qty-box span{
    font-size:12px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">Balaji <span>Mega Mart</span></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
    <i class="fa fa-search"></i>
  </div>

  <button class="admin-btn" onclick="goAdmin()">Admin Login</button>
</nav>

<section class="hero" id="hero">
  <div>
    <h1>Fresh Groceries Delivered Fast</h1>
    <p>Order essentials at best prices</p>
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
</section>

<h2 style="width:92%;margin:18px auto;">Products</h2>

<section class="products" id="productContainer"></section>

<div class="cart-icon" onclick="goToCart()">
  <i class="fa fa-shopping-cart"></i>
  <div class="cart-count" id="cartCount">0</div>
</div>

<footer>
  Balaji Mega Mart
</footer>

<script>

/* SAME LOGIC - NO CHANGE */
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("productContainer");
const hero = document.getElementById("hero");

function getQty(id){
  let item = cart.find(p=>p.id===id);
  return item ? item.qty : 0;
}

function addToCart(id){
  let item = products.find(p=>p.id===id);
  let existing = cart.find(p=>p.id===id);

  if(existing){
    existing.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  display(products);
  updateCart();
}

function inc(id){
  let item = cart.find(p=>p.id===id);
  if(item){
    item.qty++;
    save();
  }
}

function dec(id){
  let item = cart.find(p=>p.id===id);
  if(item){
    item.qty--;
    if(item.qty <= 0){
      cart = cart.filter(p=>p.id!==id);
    }
    save();
  }
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  display(products);
  updateCart();
}

function display(items){
  container.innerHTML="";

  if(items.length === 0){
    container.innerHTML = "<p style='padding:20px;'>No products added by admin yet</p>";
    return;
  }

  items.forEach(p=>{
    let qty = getQty(p.id);

    container.innerHTML += `
    <div class="card">
      <img src="${p.image}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>

        <div class="btn-area">
          ${
            qty === 0
            ? `<button class="add-btn" onclick="addToCart(${p.id})">Add</button>`
            : `
              <div class="qty-box">
                <button onclick="dec(${p.id})">-</button>
                <span>${qty}</span>
                <button onclick="inc(${p.id})">+</button>
              </div>
            `
          }
        </div>

      </div>
    </div>`;
  });
}

function updateCart(){
  let total = cart.reduce((sum,i)=>sum+i.qty,0);
  document.getElementById("cartCount").innerText = total;
}

updateCart();
display(products);

function goToCart(){
  window.location.href="carts.html";
}

function goAdmin(){
  window.location.href="login.html";
}

document.getElementById("searchInput").addEventListener("input",function(){
  let val=this.value.toLowerCase();
  let filtered = products.filter(p=>p.name.toLowerCase().includes(val));

  display(filtered);

  if(val.length>0){
    hero.classList.add("hide");
  }else{
    hero.classList.remove("hide");
  }
});

</script>

</body>
</html>
