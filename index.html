<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f172a"/>

<title>Balaji Mega Mart</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07111f;
  --bg2:#0d1b2d;

  --card:rgba(255,255,255,0.07);

  --text:#f4f7ff;
  --muted:#9ba8c7;

  --primary:#7c3aed;
  --primary2:#5b21b6;

  --gold:#f7c873;
  --green:#38d39f;

  --shadow:0 15px 35px rgba(0,0,0,0.35);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:
  radial-gradient(circle at top left,#1f1147 0%,transparent 30%),
  radial-gradient(circle at bottom right,#00354f 0%,transparent 30%),
  linear-gradient(135deg,var(--bg),var(--bg2));

  color:var(--text);
  overflow-x:hidden;
}

/* ================= NAVBAR ================= */

nav{
  position:sticky;
  top:0;
  z-index:999;

  padding:14px 5%;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;

  background:rgba(7,17,31,.7);

  backdrop-filter:blur(18px);

  border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
  font-size:22px;
  font-weight:800;
}

.logo span{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;

  border:none;
  outline:none;

  padding:14px 48px 14px 16px;

  border-radius:40px;

  background:rgba(255,255,255,.06);

  color:white;

  border:1px solid rgba(255,255,255,.08);
}

.search-box input:focus{

  border-color:rgba(247,200,115,.7);

  box-shadow:
  0 0 0 4px rgba(247,200,115,.10),
  0 10px 25px rgba(247,200,115,.15),
  0 0 20px rgba(247,200,115,.08);

  background:rgba(255,255,255,.08);

  transform:scale(1.01);
}

.admin-btn{
  border:none;

  padding:12px 18px;

  border-radius:16px;

  background:
  linear-gradient(135deg,var(--primary),var(--primary2));

  color:white;

  font-weight:700;

  cursor:pointer;
}

/* ================= HERO ================= */

.hero{
  width:92%;
  margin:20px auto;

  border-radius:32px;

  overflow:hidden;

  position:relative;

  background:
  linear-gradient(135deg,
  rgba(124,58,237,.35),
  rgba(0,212,255,.15));

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  box-shadow:var(--shadow);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:34px;

  transition:.35s;
}

.hero.hide{
  display:none;
}

.hero h1{
  font-size:38px;
  line-height:1.2;
}

.hero p{
  color:var(--muted);
  margin-top:12px;
  max-width:500px;
}

.hero-buttons{
  display:flex;
  gap:12px;
  margin-top:22px;
}

.hero-btn{
  padding:13px 20px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
}

.hero-btn.primary{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  color:#111827;
}

.hero-btn.secondary{
  background:rgba(255,255,255,.08);
  color:white;
}

.hero img{
  width:260px;
}

/* ================= FILTER BAR ================= */

.section-bar{
  width:92%;
  margin:22px auto 18px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
}

.section-title{
  font-size:24px;
  font-weight:700;
}

.filter-area{
  display:flex;
  gap:12px;
}

.filter-area select{
  background:rgba(255,255,255,.07);

  color:white;

  border:1px solid rgba(255,255,255,.08);

  padding:12px 14px;

  border-radius:14px;

  outline:none;
}

.filter-area option{
  background:#111827;
}

/* ================= PRODUCTS ================= */

.products{
  width:92%;
  margin:auto;

  display:grid;
  grid-template-columns:repeat(5,1fr);

  gap:18px;

  padding-bottom:120px;
}

/* ================= CARD ================= */

.card{
  overflow:hidden;

  border-radius:24px;

  background:var(--card);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:var(--shadow);

  transition:.35s;
}

.card:hover{
  transform:translateY(-6px);
}

.card-top{
  position:relative;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.discount{
  position:absolute;
  top:12px;
  left:12px;

  background:linear-gradient(135deg,#ff4d6d,#ff758f);

  padding:7px 12px;

  border-radius:30px;

  font-size:12px;
  font-weight:700;
}

.favorite{
  position:absolute;
  top:12px;
  right:12px;

  width:38px;
  height:38px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,.08);

  color:white;
}

.card-content{
  padding:16px;
}

.category{
  color:var(--gold);
  font-size:12px;
}

.card-content h3{
  margin-top:6px;
  font-size:15px;
  min-height:44px;
}

.rating{
  margin:10px 0;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
}

.rating i{
  color:#ffd166;
}

.price-row{
  display:flex;
  justify-content:space-between;
  margin:14px 0;
}

.price{
  font-size:22px;
  font-weight:800;
  color:var(--green);
}

.old-price{
  color:var(--muted);
  text-decoration:line-through;
}

/* ================= BUTTON ================= */

.add-btn{
  width:100%;

  border:none;

  padding:13px;

  border-radius:16px;

  cursor:pointer;

  font-weight:700;

  color:white;

  background:
  linear-gradient(135deg,var(--primary),#2563eb);
}

/* ================= QTY ================= */

.qty-box{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:rgba(255,255,255,.05);

  padding:6px;

  border-radius:18px;
}

.qty-box button{
  width:36px;
  height:36px;

  border:none;

  border-radius:12px;

  cursor:pointer;

  background:
  linear-gradient(135deg,var(--gold),#ff9f43);

  color:#111827;

  font-weight:700;
}

/* ================= FLOAT CART ================= */

.cart-icon{
  position:fixed;

  bottom:90px;
  right:20px;

  width:68px;
  height:68px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
  linear-gradient(135deg,var(--gold),#ff9f43);

  color:#111827;

  font-size:24px;

  cursor:pointer;

  box-shadow:
  0 15px 35px rgba(255,159,67,.35);

  z-index:999;
}

.cart-count{
  position:absolute;

  top:-4px;
  right:-2px;

  width:24px;
  height:24px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#ef4444;

  color:white;

  font-size:12px;
  font-weight:700;
}

/* ================= BOTTOM NAV ================= */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;

  padding:12px 0;

  background:rgba(7,17,31,.9);

  backdrop-filter:blur(20px);

  border-top:1px solid rgba(255,255,255,.08);

  z-index:998;
}

.bottom-nav ul{
  display:flex;
  justify-content:space-around;
  list-style:none;
}

.bottom-nav li{
  color:var(--muted);
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.bottom-nav i{
  display:block;
  font-size:18px;
  margin-bottom:4px;
}

@media(min-width:700px){

  .bottom-nav{
    width:420px;

    left:50%;

    transform:translateX(-50%);

    bottom:20px;

    border-radius:24px;

    border:1px solid rgba(255,255,255,.08);
  }

}

/* ================= FOOTER ================= */

footer{
  text-align:center;

  padding:40px 20px 120px;

  color:var(--muted);
}

/* ================= RESPONSIVE ================= */

@media(max-width:1200px){
  .products{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:900px){

  .products{
    grid-template-columns:repeat(3,1fr);
  }

  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero img{
    margin-top:20px;
  }

}

@media(max-width:600px){

  nav{
    flex-direction:column;
    align-items:stretch;
  }

  .hero{
    padding:24px;
  }

  .hero h1{
    font-size:28px;
  }

  .hero img{
    width:180px;
  }

  /* 3 ITEMS ROW IN MOBILE */

  .products{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }

  .card img{
    height:100px;
  }

  .card-content{
    padding:10px;
  }

  .card-content h3{
    font-size:12px;
    min-height:auto;
  }

  .price{
    font-size:16px;
  }

  .old-price{
    font-size:11px;
  }

  .discount{
    font-size:10px;
    padding:4px 8px;
  }

  .favorite{
    width:28px;
    height:28px;
    font-size:12px;
  }

  .add-btn{
    font-size:11px;
    padding:10px;
  }

}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

  <div class="logo">
    Balaji <span>Mega Mart</span>
  </div>

  <div class="search-box">

    <input
    type="text"
    id="searchInput"
    placeholder="Search groceries, fruits, snacks..."
    >

    <i class="fa fa-search"></i>

  </div>

  <button class="admin-btn" onclick="goAdmin()">
    Admin Login
  </button>

</nav>

<!-- ================= HERO ================= -->

<section class="hero" id="hero">

  <div>

    <h1>
      Fresh Groceries
      <br>
      Delivered in Minutes
    </h1>

    <p>
      Discover premium quality groceries,
      fruits, snacks and essentials.
    </p>

    <div class="hero-buttons">

      <!-- SHOP NOW -->

      <button class="hero-btn primary" onclick="hideHero()">
        Shop Now
      </button>

      <!-- EXPLORE OFFERS -->

      <button
      class="hero-btn secondary"
      onclick="window.location.href='offers.html'"
      >
        Explore Offers
      </button>

    </div>

  </div>

  <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">

</section>

<!-- ================= FILTER BAR ================= -->

<div class="section-bar">

  <div class="section-title">
    Trending Products
  </div>

  <div class="filter-area">

    <!-- CATEGORY FILTER -->

    <select id="categoryFilter">

      <option value="all">
        All Categories
      </option>

    </select>

    <!-- DISCOUNT FILTER -->

    <select id="discountFilter">

      <option value="all">
        All Offers
      </option>

      <option value="10">
        10%+ OFF
      </option>

      <option value="20">
        20%+ OFF
      </option>

      <option value="30">
        30%+ OFF
      </option>

      <option value="40">
        40%+ OFF
      </option>

    </select>

  </div>

</div>

<!-- ================= PRODUCTS ================= -->

<section class="products" id="productContainer"></section>

<!-- ================= FLOAT CART ================= -->

<div class="cart-icon" onclick="goToCart()">

  <i class="fa fa-shopping-bag"></i>

  <div class="cart-count" id="cartCount">
    0
  </div>

</div>

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav">

  <ul>

    <!-- HOME -->

    <li onclick="window.location.href='index.html'">

      <i class="fa fa-house"></i>

      Home

    </li>

    <!-- CATEGORY -->

    <li onclick="window.location.href='categories.html'">

      <i class="fa fa-layer-group"></i>

      Categories

    </li>

    <!-- CART -->

    <li onclick="window.location.href='carts.html'">

      <i class="fa fa-cart-shopping"></i>

      Cart

    </li>

    <!-- PROFILE -->

    <li onclick="window.location.href='profile.html'">

      <i class="fa fa-user"></i>

      Profile

    </li>

  </ul>

</div>

<!-- ================= FOOTER ================= -->

<footer>
  Balaji Mega Mart © 2026 • Premium Grocery App
</footer>

<!-- ================= SCRIPT ================= -->

<script>

/* ================= PWA ================= */

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* ================= DATA ================= */

let products =
JSON.parse(localStorage.getItem("products")) || [];

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const container =
document.getElementById("productContainer");

const hero =
document.getElementById("hero");

/* ================= HERO HIDE ================= */

function hideHero(){

  hero.classList.add("hide");

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

/* ================= CATEGORY LIST ================= */

function loadCategories(){

  let categories =
  [...new Set(products.map(p => p.category))];

  let select =
  document.getElementById("categoryFilter");

  categories.forEach(cat => {

    select.innerHTML +=
    `
    <option value="${cat}">
      ${cat}
    </option>
    `;
  });
}

/* ================= FILTER PRODUCTS ================= */

function applyFilters(){

  let category =
  document.getElementById("categoryFilter").value;

  let discount =
  document.getElementById("discountFilter").value;

  let filtered = [...products];

  /* CATEGORY FILTER */

  if(category !== "all"){

    filtered =
    filtered.filter(
      p => p.category === category
    );
  }

  /* DISCOUNT FILTER */

  if(discount !== "all"){

    filtered =
    filtered.filter(p => {

      let off =
      ((p.mrp - p.price) / p.mrp) * 100;

      return off >= discount;
    });
  }

  display(filtered);
}

/* ================= EVENTS ================= */

document
.getElementById("categoryFilter")
.addEventListener("change", applyFilters);

document
.getElementById("discountFilter")
.addEventListener("change", applyFilters);

/* ================= FUNCTIONS ================= */

function getQty(id){

  let item = cart.find(p => p.id === id);

  return item ? item.qty : 0;
}

/* ================= ADD ================= */

function addToCart(id){

  let item =
  products.find(p => p.id === id);

  let existing =
  cart.find(p => p.id === id);

  if(existing){

    existing.qty++;

  }else{

    cart.push({
      ...item,
      qty:1
    });

  }

  save();
}

/* ================= INCREASE ================= */

function inc(id){

  let item =
  cart.find(p => p.id === id);

  if(item){

    item.qty++;

    save();
  }
}

/* ================= DECREASE ================= */

function dec(id){

  let item =
  cart.find(p => p.id === id);

  if(item){

    item.qty--;

    if(item.qty <= 0){

      cart =
      cart.filter(p => p.id !== id);

    }

    save();
  }
}

/* ================= SAVE ================= */

function save(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  display(products);

  updateCart();
}

/* ================= DISPLAY ================= */

function display(items){

  container.innerHTML = "";

  if(items.length === 0){

    container.innerHTML =
    `
    <p style="
      padding:30px;
      color:#9ba8c7;
    ">
      No products available
    </p>
    `;

    return;
  }

  items.forEach(p => {

    let qty = getQty(p.id);

    let discount =
    Math.round(
      ((p.mrp - p.price) / p.mrp) * 100
    );

    container.innerHTML += `

    <div class="card">

      <div class="card-top">

        <img src="${p.image}">

        <div class="discount">
          ${discount}% OFF
        </div>

        <div class="favorite">
          <i class="fa fa-heart"></i>
        </div>

      </div>

      <div class="card-content">

        <div class="category">
          ${p.category}
        </div>

        <h3>
          ${p.name}
        </h3>

        <div class="rating">

          <i class="fa fa-star"></i>

          <span>
            ${p.rating} Rating
          </span>

        </div>

        <div class="price-row">

          <div class="price">
            ₹${p.price}
          </div>

          <div class="old-price">
            ₹${p.mrp}
          </div>

        </div>

        ${
          qty === 0

          ?

          `
          <button
            class="add-btn"
            onclick="addToCart(${p.id})"
          >
            Add to Cart
          </button>
          `

          :

          `
          <div class="qty-box">

            <button onclick="dec(${p.id})">
              -
            </button>

            <span>
              ${qty}
            </span>

            <button onclick="inc(${p.id})">
              +
            </button>

          </div>
          `
        }

      </div>

    </div>
    `;
  });
}

/* ================= UPDATE CART ================= */

function updateCart(){

  let total =
  cart.reduce((sum,i)=>sum+i.qty,0);

  document.getElementById(
    "cartCount"
  ).innerText = total;
}

/* ================= ROUTING ================= */

function goToCart(){

  window.location.href = "carts.html";
}

function goAdmin(){

  window.location.href = "login.html";
}

/* ================= SEARCH ================= */

document
.getElementById("searchInput")
.addEventListener("input",function(){

  let val =
  this.value.toLowerCase();

  let filtered =
  products.filter(p =>
    p.name.toLowerCase().includes(val)
  );

  display(filtered);

});

/* ================= INIT ================= */

updateCart();

display(products);

loadCategories();

</script>

</body>
</html>
