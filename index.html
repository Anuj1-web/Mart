<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Balaji Mega Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f6f8fb;
  color:#1a1a1a;
}

/* NAVBAR */
nav{
  background:#ffffff;
  padding:14px 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 2px 15px rgba(0,0,0,0.06);
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#0f2d4a;
  flex:1;
}

.logo span{
  color:#00a884;
}

/* SEARCH */
.search-box{
  flex:2;
  position:relative;
  min-width:180px;
}

.search-box input{
  width:100%;
  padding:10px 40px 10px 15px;
  border-radius:25px;
  border:1px solid #e5e7eb;
  outline:none;
  background:#f9fafb;
  font-size:14px;
}

.search-box i{
  position:absolute;
  right:12px;
  top:10px;
  color:#777;
}

/* ADMIN BUTTON */
.admin-btn{
  background:#0f2d4a;
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}

/* HERO */
.hero{
  width:90%;
  margin:25px auto;
  background:linear-gradient(135deg,#0f2d4a,#1f4e79);
  border-radius:18px;
  padding:50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

.hero.hide{
  display:none;
}

.hero-text h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero-text p{
  color:#dbe7f3;
}

.hero img{
  width:280px;
}

/* TITLE */
.section-title{
  width:90%;
  margin:25px auto 10px;
  font-size:22px;
  font-weight:600;
  color:#0f2d4a;
}

/* PRODUCTS GRID (DEFAULT DESKTOP 5 COL) */
.products{
  width:90%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  padding-bottom:60px;
}

/* CARD FIXED */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(0,0,0,0.06);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.card-content h3{
  font-size:14px;
  margin-bottom:5px;
}

.price{
  color:#00a884;
  font-weight:600;
  font-size:14px;
  margin-bottom:8px;
}

.add-btn{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0f2d4a;
  color:white;
  font-size:12px;
  cursor:pointer;
}

/* CART */
.cart-icon{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#ff8c42;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:20px;
}

.cart-count{
  position:absolute;
  top:-4px;
  right:-4px;
  background:#0f2d4a;
  color:white;
  width:20px;
  height:20px;
  border-radius:50%;
  font-size:11px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#0f2d4a;
  color:white;
}

/* =========================
   RESPONSIVE BREAKPOINTS
========================= */

/* tablet */
@media(max-width:1024px){
  .products{
    grid-template-columns:repeat(3,1fr);
  }
}

/* MOBILE = 3 COLUMNS (AS YOU WANTED) */
@media(max-width:600px){

  nav{
    flex-direction:column;
    align-items:stretch;
  }

  .logo{
    text-align:center;
  }

  .search-box{
    width:100%;
  }

  .admin-btn{
    width:100%;
  }

  .hero{
    flex-direction:column;
    text-align:center;
    padding:35px 20px;
  }

  .hero img{
    width:180px;
    margin-top:15px;
  }

  .hero-text h1{
    font-size:26px;
  }

  /* 🔥 MOBILE 3 COLUMNS */
  .products{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }

  .card img{
    height:85px;
  }

  .card-content{
    padding:8px;
  }

  .card-content h3{
    font-size:11px;
  }

  .price{
    font-size:12px;
  }

  .add-btn{
    font-size:10px;
    padding:6px;
  }
}

</style>
</head>

<body>

<nav>
  <div class="logo">Balaji <span>Mega Mart</span></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search groceries...">
    <i class="fa fa-search"></i>
  </div>

  <button class="admin-btn" onclick="goAdmin()">Admin Login</button>
</nav>

<section class="hero" id="hero">
  <div class="hero-text">
    <h1>Fresh Groceries Delivered Fast</h1>
    <p>Order daily essentials at best prices.</p>
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
</section>

<h2 class="section-title">Popular Products</h2>

<section class="products" id="productContainer"></section>

<div class="cart-icon" onclick="goToCart()">
  <i class="fa fa-shopping-cart"></i>
  <div class="cart-count" id="cartCount">0</div>
</div>

<footer>
  <h3>Balaji Mega Mart</h3>
  <p>Fresh. Fast. Reliable.</p>
</footer>

<script>

const products = [
{ id:1, name:"Fresh Apples", price:120, image:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce"},
{ id:2, name:"Organic Milk", price:60, image:"https://images.unsplash.com/photo-1550583724-b2692b85b150"},
{ id:3, name:"Potato Chips", price:40, image:"https://images.unsplash.com/photo-1585238342024-78d387f4a707"},
{ id:4, name:"Fresh Bread", price:35, image:"https://images.unsplash.com/photo-1509440159596-0249088772ff"},
{ id:5, name:"Rice Bag", price:850, image:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{ id:6, name:"Cold Drinks", price:90, image:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("productContainer");
const hero = document.getElementById("hero");

function display(items){
  container.innerHTML="";
  items.forEach(p=>{
    container.innerHTML+=`
    <div class="card">
      <img src="${p.image}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <button class="add-btn" onclick="addToCart(${p.id})">Add</button>
      </div>
    </div>`;
  });
}

display(products);

function addToCart(id){
  const item = products.find(p=>p.id===id);
  cart.push(item);
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;
}

updateCart();

function goToCart(){
  window.location.href="carts.html";
}

function goAdmin(){
  window.location.href="login.html";
}

/* SEARCH + HERO HIDE */
document.getElementById("searchInput").addEventListener("input",function(){

  let val=this.value.toLowerCase();
  let filtered=products.filter(p=>p.name.toLowerCase().includes(val));

  display(filtered);

  if(val.length>0){
    hero.classList.add("hide");
  }else{
    hero.classList.remove("hide");
  }
});

</script>

</body>
</html>
