<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f172a"/>

<title>Categories • Balaji Mega Mart</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
  --bg:#07111f;
  --bg2:#0d1b2d;

  --card:rgba(255,255,255,0.06);
  --line:rgba(255,255,255,0.08);

  --text:#f4f7ff;
  --muted:#9ba8c7;

  --primary:#7c3aed;
  --primary2:#5b21b6;

  --gold:#f7c873;
  --green:#38d39f;

  --shadow:0 15px 35px rgba(0,0,0,.35);
}

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  background:
  radial-gradient(circle at top left,#1f1147 0%,transparent 30%),
  radial-gradient(circle at bottom right,#00354f 0%,transparent 30%),
  linear-gradient(135deg,var(--bg),var(--bg2));

  color:var(--text);

  min-height:100vh;

  overflow-x:hidden;
}

/* ================= PAGE ANIMATION ================= */

body{
  animation:fadePage .4s ease;
}

@keyframes fadePage{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

.page-exit{
  animation:pageOut .18s ease forwards;
}

@keyframes pageOut{
  to{
    opacity:0;
    transform:scale(.98);
  }
}

/* ================= NAVBAR ================= */

nav{
  position:sticky;
  top:0;
  z-index:999;

  padding:14px 5%;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;

  background:rgba(7,17,31,.75);

  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--line);
}

.logo{
  font-size:24px;
  font-weight:800;
}

.logo span{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.back-btn{
  border:none;

  padding:12px 18px;

  border-radius:14px;

  background:
  linear-gradient(135deg,var(--primary),var(--primary2));

  color:white;

  font-weight:700;

  cursor:pointer;

  transition:.25s;
}

.back-btn:hover{
  transform:translateY(-2px);
}

/* ================= MAIN LAYOUT ================= */

.main-layout{
  width:94%;
  margin:24px auto 120px;

  display:flex;
  gap:22px;
}

/* ================= CATEGORY SIDEBAR ================= */

.category-sidebar{
  width:95px;
  min-width:95px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  border-radius:28px;

  padding:14px 10px;

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);

  height:calc(100vh - 140px);

  overflow-y:auto;

  position:sticky;
  top:90px;
}

.category-sidebar::-webkit-scrollbar{
  width:4px;
}

.category-sidebar::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.15);
  border-radius:20px;
}

.category-item{
  padding:14px 10px;

  border-radius:18px;

  text-align:center;

  margin-bottom:12px;

  cursor:pointer;

  transition:.25s;

  border:1px solid transparent;

  background:rgba(255,255,255,.04);
}

.category-item:hover{
  transform:translateY(-2px);
}

.category-item.active{
  background:
  linear-gradient(135deg,var(--gold),#ff9f43);

  color:#111827;

  border-color:rgba(255,255,255,.2);

  font-weight:700;

  box-shadow:
  0 10px 20px rgba(255,159,67,.25);
}

.category-item i{
  display:block;
  font-size:22px;
  margin-bottom:8px;
}

.category-item span{
  font-size:12px;
  line-height:1.4;
  display:block;
  word-break:break-word;
}

/* ================= PRODUCTS AREA ================= */

.products-area{
  flex:1;
}

.products-header{
  margin-bottom:22px;
}

.products-header h2{
  font-size:32px;
  font-weight:800;
}

.products-header p{
  color:var(--muted);
  margin-top:6px;
}

/* ================= PRODUCT GRID ================= */

.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

/* ================= PRODUCT CARD ================= */

.card{
  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  border-radius:26px;

  overflow:hidden;

  backdrop-filter:blur(18px);

  transition:.3s;

  position:relative;

  box-shadow:
  0 10px 25px rgba(0,0,0,.25);
}

.card:hover{
  transform:
  translateY(-6px)
  scale(1.02);

  border-color:rgba(247,200,115,.35);

  box-shadow:
  0 18px 35px rgba(0,0,0,.35);
}

.card-top{
  position:relative;

  padding:14px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.06),
    rgba(255,255,255,.02)
  );
}

.image-box{
  width:100%;
  aspect-ratio:1/1;

  border-radius:22px;

  background:
  linear-gradient(
    145deg,
    rgba(255,255,255,.18),
    rgba(255,255,255,.05)
  );

  border:1px solid rgba(255,255,255,.08);

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;
}

.image-box img{
  width:82%;
  height:82%;
  object-fit:contain;

  transition:.35s;
}

.card:hover .image-box img{
  transform:scale(1.08);
}

/* ================= BADGES ================= */

.discount{
  position:absolute;
  top:24px;
  left:24px;

  background:
  linear-gradient(
    135deg,
    #ff4d6d,
    #ff758f
  );

  padding:6px 11px;

  border-radius:30px;

  font-size:11px;
  font-weight:700;

  color:white;

  z-index:5;
}

.favorite{
  position:absolute;
  top:24px;
  right:24px;

  width:36px;
  height:36px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,.15);

  backdrop-filter:blur(10px);

  color:white;

  cursor:pointer;

  z-index:5;

  transition:.25s;
}

.favorite.active{
  background:#ff4d6d;
  color:white;
}

.favorite:hover{
  transform:scale(1.08);
}

/* ================= CONTENT ================= */

.card-content{
  padding:16px;
}

.product-category{
  color:var(--gold);

  font-size:11px;
  font-weight:700;

  margin-bottom:6px;

  text-transform:uppercase;
}

.card-content h3{
  font-size:15px;
  line-height:1.5;

  min-height:46px;
}

.rating{
  margin:10px 0;

  display:flex;
  align-items:center;
  gap:6px;

  font-size:12px;

  color:var(--muted);
}

.rating i{
  color:#ffd166;
}

.price-row{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;

  margin:12px 0 14px;
}

.price{
  font-size:22px;
  font-weight:800;
  color:var(--green);
}

.old-price{
  font-size:12px;
  color:var(--muted);
  text-decoration:line-through;
}

.save{
  font-size:11px;
  color:#ff758f;
  font-weight:700;
}

/* ================= BUTTONS ================= */

.add-btn{
  width:100%;

  border:none;

  padding:12px;

  border-radius:14px;

  cursor:pointer;

  font-weight:700;

  color:white;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    #2563eb
  );

  transition:.25s;
}

.add-btn:hover{
  transform:translateY(-2px);
}

.qty-box{
  display:flex;
  align-items:center;
  justify-content:space-between;

  gap:10px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  padding:6px;

  border-radius:14px;
}

.qty-box button{
  width:34px;
  height:34px;

  border:none;

  border-radius:10px;

  cursor:pointer;

  background:
  linear-gradient(
    135deg,
    var(--gold),
    #ff9f43
  );

  color:#111827;

  font-size:18px;
  font-weight:700;
}

.qty-box span{
  font-size:15px;
  font-weight:700;
}

/* ================= EMPTY ================= */

.empty{
  padding:70px 20px;
  text-align:center;
  color:var(--muted);
}

.empty i{
  font-size:60px;
  margin-bottom:16px;
  opacity:.5;
}

/* ================= BOTTOM NAV ================= */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;

  padding:12px 0;

  background:rgba(7,17,31,.92);

  backdrop-filter:blur(20px);

  border-top:1px solid rgba(255,255,255,.08);

  z-index:999;
}

.bottom-nav ul{
  display:flex;
  justify-content:space-around;
  list-style:none;
}

.bottom-nav li{
  color:var(--muted);
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.bottom-nav li.active{
  color:var(--gold);
}

.bottom-nav i{
  display:block;
  font-size:18px;
  margin-bottom:4px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:700px){

  .main-layout{
    gap:12px;
    width:96%;
  }

  .category-sidebar{
    width:84px;
    min-width:84px;
    padding:10px 8px;
  }

  .products-grid{
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }

  .card{
    min-width:100%;
  }

  .products-header h2{
    font-size:24px;
  }

  .category-item span{
    font-size:11px;
  }

}

@media(min-width:700px){

  .bottom-nav{
    width:420px;
    left:50%;
    transform:translateX(-50%);
    bottom:20px;

    border-radius:24px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);
  }

}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

  <div class="logo">
    Balaji <span>Mega Mart</span>
  </div>

  <button class="back-btn" onclick="goHome()">
    <i class="fa fa-arrow-left"></i>
    Back
  </button>

</nav>

<!-- ================= MAIN ================= -->

<div class="main-layout">

  <!-- CATEGORY SIDEBAR -->

  <div class="category-sidebar" id="categorySidebar">
  </div>

  <!-- PRODUCTS -->

  <div class="products-area">

    <div class="products-header">

      <h2 id="categoryTitle">
        Categories
      </h2>

      <p>
        Browse premium grocery products category wise
      </p>

    </div>

    <div class="products-grid" id="productsGrid">
    </div>

  </div>

</div>

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav">

  <ul>

    <li onclick="goHome()">
      <i class="fa fa-house"></i>
      Home
    </li>

    <li class="active">
      <i class="fa fa-layer-group"></i>
      Categories
    </li>

    <li onclick="goCart()">
      <i class="fa fa-cart-shopping"></i>
      Cart
    </li>

    <li onclick="goProfile()">
      <i class="fa fa-user"></i>
      Profile
    </li>

  </ul>

</div>

<script>

/* ================= DATA ================= */

let products =
JSON.parse(localStorage.getItem("products")) || [];

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let favorites =
JSON.parse(localStorage.getItem("favorites")) || [];

let categories = [
  ...new Set(products.map(p => p.category))
];

let selectedCategory =
categories[0] || "";

/* ================= INIT ================= */

renderCategories();

if(selectedCategory){
  renderProducts(selectedCategory);
}

/* ================= RENDER CATEGORIES ================= */

function renderCategories(){

  const sidebar =
  document.getElementById("categorySidebar");

  if(categories.length === 0){

    sidebar.innerHTML = `
      <div class="empty">
        No Categories
      </div>
    `;

    return;
  }

  sidebar.innerHTML = "";

  categories.forEach(category => {

    sidebar.innerHTML += `

      <div
        class="category-item ${
          selectedCategory === category
          ? "active"
          : ""
        }"

        onclick="selectCategory('${category}')"
      >

        <i class="fa fa-box"></i>

        <span>
          ${category}
        </span>

      </div>

    `;
  });

}

/* ================= SELECT CATEGORY ================= */

function selectCategory(category){

  selectedCategory = category;

  renderCategories();

  renderProducts(category);

}

/* ================= GET QTY ================= */

function getQty(id){

  let item =
  cart.find(p => p.id === id);

  return item ? item.qty : 0;

}

/* ================= FAVORITES ================= */

function isFavorite(id){

  return favorites.some(
    item => item.id === id
  );

}

function toggleFavorite(id){

  let product =
  products.find(p => p.id === id);

  let exists =
  favorites.find(p => p.id === id);

  if(exists){

    favorites =
    favorites.filter(p => p.id !== id);

  }else{

    favorites.push(product);

  }

  localStorage.setItem(
    "favorites",
    JSON.stringify(favorites)
  );

  renderProducts(selectedCategory);

}

/* ================= CART ================= */

function addToCart(id){

  let item =
  products.find(p => p.id === id);

  let existing =
  cart.find(p => p.id === id);

  if(existing){

    existing.qty++;

  }else{

    cart.push({
      ...item,
      qty:1
    });

  }

  saveCart();

}

function increase(id){

  let item =
  cart.find(p => p.id === id);

  if(item){

    item.qty++;

    saveCart();

  }

}

function decrease(id){

  let item =
  cart.find(p => p.id === id);

  if(item){

    item.qty--;

    if(item.qty <= 0){

      cart =
      cart.filter(p => p.id !== id);

    }

    saveCart();

  }

}

function saveCart(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  renderProducts(selectedCategory);

}

/* ================= RENDER PRODUCTS ================= */

function renderProducts(category){

  const grid =
  document.getElementById("productsGrid");

  document.getElementById(
    "categoryTitle"
  ).innerText = category;

  let filtered =
  products.filter(
    p => p.category === category
  );

  if(filtered.length === 0){

    grid.innerHTML = `
      <div class="empty">
        <i class="fa fa-box-open"></i>
        <h2>No Products Found</h2>
      </div>
    `;

    return;
  }

  grid.innerHTML = "";

  filtered.forEach(p => {

    let qty = getQty(p.id);

    let discount =
    Math.round(
      ((p.mrp - p.price) / p.mrp) * 100
    );

    let saving =
    p.mrp - p.price;

    grid.innerHTML += `

      <div class="card">

        <div class="card-top">

          <div class="discount">
            ${discount}% OFF
          </div>

          <div
            class="favorite ${
              isFavorite(p.id)
              ? "active"
              : ""
            }"

            onclick="toggleFavorite(${p.id})"
          >
            <i class="fa fa-heart"></i>
          </div>

          <div class="image-box">

            <img src="${p.image}">

          </div>

        </div>

        <div class="card-content">

          <div class="product-category">
            ${p.category}
          </div>

          <h3>
            ${p.name}
          </h3>

          <div class="rating">

            <i class="fa fa-star"></i>

            <span>
              ${p.rating || 4.5} Rating
            </span>

          </div>

          <div class="price-row">

            <div>

              <div class="price">
                ₹${p.price}
              </div>

              <div class="old-price">
                ₹${p.mrp}
              </div>

            </div>

            <div class="save">
              Save ₹${saving}
            </div>

          </div>

          ${
            qty === 0

            ?

            `
            <button
              class="add-btn"
              onclick="addToCart(${p.id})"
            >
              Add to Cart
            </button>
            `

            :

            `
            <div class="qty-box">

              <button onclick="decrease(${p.id})">
                -
              </button>

              <span>
                ${qty}
              </span>

              <button onclick="increase(${p.id})">
                +
              </button>

            </div>
            `
          }

        </div>

      </div>

    `;

  });

}

/* ================= ROUTING ================= */

function navigate(page){

  document.body.classList.add("page-exit");

  setTimeout(()=>{
    window.location.href = page;
  },180);

}

function goHome(){
  navigate("index.html");
}

function goCart(){
  navigate("carts.html");
}

function goProfile(){
  navigate("profiles.html");
}

/* ================= PAGE SHOW ================= */

window.addEventListener("pageshow",()=>{

  document.body.classList.remove(
    "page-exit"
  );

});

</script>

</body>
</html>
