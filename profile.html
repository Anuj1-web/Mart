<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f172a"/>

<title>My Profile - Balaji Mega Mart</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07111f;
  --bg2:#0d1b2d;

  --card:rgba(255,255,255,0.06);
  --line:rgba(255,255,255,0.08);

  --text:#f4f7ff;
  --muted:#9ba8c7;

  --primary:#7c3aed;
  --primary2:#5b21b6;

  --gold:#f7c873;
  --green:#38d39f;

  --danger:#ff5f6d;

  --shadow:0 15px 35px rgba(0,0,0,0.35);

  --radius:24px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:
  radial-gradient(circle at top left,#1f1147 0%,transparent 30%),
  radial-gradient(circle at bottom right,#00354f 0%,transparent 30%),
  linear-gradient(135deg,var(--bg),var(--bg2));

  color:var(--text);

  min-height:100vh;

  overflow-x:hidden;

  animation:fadePage .5s ease;
}

@keyframes fadePage{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

/* ================= NAVBAR ================= */

nav{
  position:sticky;
  top:0;
  z-index:999;

  padding:14px 5%;

  display:flex;
  align-items:center;
  justify-content:space-between;

  background:rgba(7,17,31,0.75);

  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--line);
}

.logo{
  font-size:24px;
  font-weight:800;
}

.logo span{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.back-btn{
  border:none;

  padding:12px 18px;

  border-radius:16px;

  background:
  linear-gradient(135deg,var(--primary),var(--primary2));

  color:white;

  font-weight:700;

  cursor:pointer;

  transition:.25s;
}

.back-btn:hover{
  transform:translateY(-2px);
}

/* ================= MAIN ================= */

.container{
  width:92%;
  max-width:900px;

  margin:30px auto 120px;
}

/* ================= PROFILE CARD ================= */

.profile-card{
  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:32px;

  padding:32px;

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);

  position:relative;

  overflow:hidden;
}

.profile-card::before{
  content:"";

  position:absolute;
  inset:0;

  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.06),
    transparent
  );

  transform:translateX(-100%);

  animation:shine 5s infinite;
}

@keyframes shine{
  100%{
    transform:translateX(200%);
  }
}

/* ================= TOP ================= */

.profile-top{
  display:flex;
  align-items:center;
  gap:20px;

  margin-bottom:35px;

  position:relative;
  z-index:2;
}

.avatar{
  width:95px;
  height:95px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:36px;

  background:
  linear-gradient(
    135deg,
    var(--gold),
    #ff9f43
  );

  color:#111827;

  font-weight:800;

  box-shadow:
  0 12px 30px rgba(255,159,67,.35);
}

.profile-info h2{
  font-size:28px;
  margin-bottom:6px;
}

.profile-info p{
  color:var(--muted);
  line-height:1.6;
}

/* ================= FORM ================= */

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:22px;

  position:relative;
  z-index:2;
}

.input-group{
  display:flex;
  flex-direction:column;
}

.input-group.full{
  grid-column:1/-1;
}

label{
  margin-bottom:10px;

  font-size:14px;
  font-weight:600;

  color:#dbe4ff;
}

.input-box{
  position:relative;
}

.input-box i{
  position:absolute;
  top:17px;
  left:16px;

  color:var(--muted);
}

input,
textarea{
  width:100%;

  border:none;
  outline:none;

  padding:16px 16px 16px 48px;

  border-radius:18px;

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  color:var(--text);

  font-size:15px;

  transition:.3s;
}

textarea{
  min-height:120px;
  resize:none;
}

input:focus,
textarea:focus{
  border-color:rgba(247,200,115,.5);

  box-shadow:
  0 0 0 5px rgba(247,200,115,.08);
}

/* ================= BUTTONS ================= */

.actions{
  margin-top:30px;

  display:flex;
  flex-wrap:wrap;
  gap:16px;

  position:relative;
  z-index:2;
}

.action-btn{
  flex:1;

  min-width:220px;

  border:none;

  padding:16px;

  border-radius:18px;

  cursor:pointer;

  font-size:15px;
  font-weight:700;

  transition:.25s;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.save-btn{
  background:
  linear-gradient(
    135deg,
    var(--gold),
    #ff9f43
  );

  color:#111827;
}

.fav-btn{
  background:
  linear-gradient(
    135deg,
    var(--primary),
    #2563eb
  );

  color:white;
}

.logout-btn{
  background:
  linear-gradient(
    135deg,
    #ff4d6d,
    #ff758f
  );

  color:white;
}

.action-btn:hover{
  transform:translateY(-3px);
}

/* ================= STATUS ================= */

.status{
  margin-top:22px;

  padding:14px;

  border-radius:16px;

  text-align:center;

  font-weight:600;

  display:none;

  position:relative;
  z-index:2;
}

.status.success{
  display:block;

  background:rgba(56,211,159,.12);

  border:1px solid rgba(56,211,159,.3);

  color:var(--green);
}

/* ================= BOTTOM NAV ================= */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;

  width:100%;

  padding:12px 0;

  background:rgba(7,17,31,.92);

  backdrop-filter:blur(20px);

  border-top:1px solid rgba(255,255,255,.08);

  z-index:999;
}

.bottom-nav ul{
  display:flex;
  justify-content:space-around;
  list-style:none;
}

.bottom-nav li{
  color:var(--muted);
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.bottom-nav i{
  display:block;
  margin-bottom:4px;
  font-size:18px;
}

.bottom-nav .active{
  color:var(--gold);
}

@media(min-width:700px){

  .bottom-nav{
    width:420px;
    left:50%;
    transform:translateX(-50%);
    bottom:20px;

    border-radius:24px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);
  }

}

/* ================= MOBILE ================= */

@media(max-width:700px){

  .profile-top{
    flex-direction:column;
    text-align:center;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .profile-card{
    padding:24px;
  }

}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

  <div class="logo">
    Balaji <span>Mega Mart</span>
  </div>

  <button class="back-btn" onclick="goHome()">
    <i class="fa fa-house"></i>
    Home
  </button>

</nav>

<!-- ================= MAIN ================= -->

<div class="container">

  <div class="profile-card">

    <div class="profile-top">

      <div class="avatar" id="avatarLetter">
        U
      </div>

      <div class="profile-info">

        <h2 id="profileName">
          Your Profile
        </h2>

        <p>
          Manage your delivery details,
          contact information and favourite items.
        </p>

      </div>

    </div>

    <!-- ================= FORM ================= -->

    <div class="form-grid">

      <div class="input-group">

        <label>Full Name</label>

        <div class="input-box">
          <i class="fa fa-user"></i>

          <input
            type="text"
            id="name"
            placeholder="Enter your full name"
          >
        </div>

      </div>

      <div class="input-group">

        <label>Mobile Number</label>

        <div class="input-box">
          <i class="fa fa-phone"></i>

          <input
            type="tel"
            id="mobile"
            placeholder="Enter mobile number"
          >
        </div>

      </div>

      <div class="input-group">

        <label>Email ID</label>

        <div class="input-box">
          <i class="fa fa-envelope"></i>

          <input
            type="email"
            id="email"
            placeholder="Enter email id"
          >
        </div>

      </div>

      <div class="input-group">

        <label>City / Area</label>

        <div class="input-box">
          <i class="fa fa-location-dot"></i>

          <input
            type="text"
            id="city"
            placeholder="Enter city or area"
          >
        </div>

      </div>

      <div class="input-group full">

        <label>Delivery Address</label>

        <div class="input-box">
          <i class="fa fa-map-location-dot"></i>

          <textarea
            id="address"
            placeholder="Enter complete address"
          ></textarea>
        </div>

      </div>

    </div>

    <!-- ================= BUTTONS ================= -->

    <div class="actions">

      <button class="action-btn save-btn" onclick="saveProfile()">

        <i class="fa fa-floppy-disk"></i>

        Save Profile

      </button>

      <button class="action-btn fav-btn" onclick="goFavourites()">

        <i class="fa fa-heart"></i>

        Favourite Items

      </button>

      <button class="action-btn logout-btn" onclick="logoutUser()">

        <i class="fa fa-right-from-bracket"></i>

        Logout

      </button>

    </div>

    <div class="status" id="statusBox">
      Profile Saved Successfully
    </div>

  </div>

</div>

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav">

  <ul>

    <li onclick="goHome()">
      <i class="fa fa-house"></i>
      Home
    </li>

    <li onclick="goCategories()">
      <i class="fa fa-layer-group"></i>
      Categories
    </li>

    <li onclick="goCart()">
      <i class="fa fa-cart-shopping"></i>
      Cart
    </li>

    <li class="active">
      <i class="fa fa-user"></i>
      Profile
    </li>

  </ul>

</div>

<script>

/* ================= PWA ================= */

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* ================= PROFILE ================= */

let profile =
JSON.parse(
  localStorage.getItem("profile")
) || {};

/* ================= LOAD ================= */

function loadProfile(){

  document.getElementById("name").value =
  profile.name || "";

  document.getElementById("mobile").value =
  profile.mobile || "";

  document.getElementById("email").value =
  profile.email || "";

  document.getElementById("city").value =
  profile.city || "";

  document.getElementById("address").value =
  profile.address || "";

  updateProfileUI();
}

/* ================= SAVE ================= */

function saveProfile(){

  profile = {

    name:
    document.getElementById("name").value,

    mobile:
    document.getElementById("mobile").value,

    email:
    document.getElementById("email").value,

    city:
    document.getElementById("city").value,

    address:
    document.getElementById("address").value

  };

  localStorage.setItem(
    "profile",
    JSON.stringify(profile)
  );

  updateProfileUI();

  const status =
  document.getElementById("statusBox");

  status.classList.add("success");

  setTimeout(()=>{

    status.classList.remove("success");

  },2500);
}

/* ================= UPDATE UI ================= */

function updateProfileUI(){

  let name =
  profile.name || "Your Profile";

  document.getElementById(
    "profileName"
  ).innerText = name;

  let firstLetter =
  name.charAt(0).toUpperCase();

  document.getElementById(
    "avatarLetter"
  ).innerText = firstLetter;
}

/* ================= FAVOURITES ================= */

function goFavourites(){

  window.location.href =
  "favourites.html";
}

/* ================= LOGOUT ================= */

function logoutUser(){

  localStorage.removeItem("profile");

  alert("Logged Out Successfully");

  window.location.href =
  "index.html";
}

/* ================= ROUTING ================= */

function goHome(){
  window.location.href = "index.html";
}

function goCategories(){
  window.location.href = "categories.html";
}

function goCart(){
  window.location.href = "carts.html";
}

/* ================= INIT ================= */

loadProfile();

</script>

</body>
</html>
