<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#07111f"/>

<title>Balaji Mega Mart Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07111f;
  --bg2:#0d1b2d;
  --card:rgba(255,255,255,0.06);
  --line:rgba(255,255,255,0.08);

  --text:#f4f7ff;
  --muted:#9ba8c7;

  --primary:#7c3aed;
  --primary2:#5b21b6;

  --gold:#f7c873;
  --green:#38d39f;
  --red:#ff5c7a;

  --shadow:0 15px 35px rgba(0,0,0,.35);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:
  radial-gradient(circle at top left,#1f1147 0%,transparent 30%),
  radial-gradient(circle at bottom right,#00354f 0%,transparent 30%),
  linear-gradient(135deg,var(--bg),var(--bg2));

  color:var(--text);
  min-height:100vh;
}

/* ================= NAV ================= */

nav{
  position:sticky;
  top:0;
  z-index:999;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:18px 5%;

  background:rgba(7,17,31,.8);
  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--line);
}

.logo{
  font-size:24px;
  font-weight:800;
}

.logo span{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.back-btn{
  border:none;
  padding:12px 18px;

  border-radius:14px;

  background:linear-gradient(135deg,var(--primary),var(--primary2));

  color:white;

  font-weight:700;
  cursor:pointer;
}

/* ================= MAIN ================= */

.container{
  width:92%;
  max-width:1300px;
  margin:30px auto;
}

/* ================= TOP GRID ================= */

.top-grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:25px;
}

@media(max-width:1000px){

  .top-grid{
    grid-template-columns:1fr;
  }

}

/* ================= FORM ================= */

.form-card{
  background:var(--card);

  border:1px solid var(--line);

  border-radius:28px;

  padding:26px;

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);

  position:sticky;
  top:100px;
}

.form-title{
  font-size:26px;
  font-weight:800;
  margin-bottom:6px;
}

.form-sub{
  color:var(--muted);
  margin-bottom:25px;
  font-size:14px;
}

.input-box{
  margin-bottom:18px;
}

.input-box label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  font-weight:600;
}

.input-box input{
  width:100%;

  padding:14px 16px;

  border:none;
  outline:none;

  border-radius:16px;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  color:var(--text);

  transition:.3s;
}

.input-box input:focus{
  border-color:rgba(247,200,115,.5);

  box-shadow:
  0 0 0 5px rgba(247,200,115,.08);
}

.image-preview{
  width:100%;
  height:220px;

  border-radius:22px;

  overflow:hidden;

  border:1px solid rgba(255,255,255,.08);

  background:rgba(255,255,255,.05);

  display:flex;
  align-items:center;
  justify-content:center;

  margin-bottom:20px;
}

.image-preview img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.price-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.discount-box{
  background:rgba(56,211,159,.12);

  border:1px solid rgba(56,211,159,.2);

  padding:16px;

  border-radius:18px;

  margin-bottom:20px;
}

.discount-box h3{
  font-size:15px;
  margin-bottom:8px;
}

.discount-box p{
  font-size:28px;
  color:var(--green);
  font-weight:800;
}

.action-buttons{
  display:flex;
  gap:12px;
}

.action-buttons button{
  flex:1;

  border:none;

  padding:14px;

  border-radius:16px;

  font-weight:700;

  cursor:pointer;

  transition:.25s;
}

.save-btn{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  color:#111827;
}

.clear-btn{
  background:rgba(255,255,255,.08);
  color:white;
}

.action-buttons button:hover{
  transform:translateY(-2px);
}

/* ================= PRODUCTS ================= */

.products-section{
  background:var(--card);

  border:1px solid var(--line);

  border-radius:28px;

  padding:26px;

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);
}

.section-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;

  margin-bottom:25px;
}

.section-top h2{
  font-size:28px;
  font-weight:800;
}

.search-box{
  width:300px;
  position:relative;
}

.search-box input{
  width:100%;

  padding:14px 16px 14px 44px;

  border:none;
  outline:none;

  border-radius:16px;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  color:white;
}

.search-box i{
  position:absolute;
  left:16px;
  top:15px;
  color:var(--muted);
}

.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}

.product-card{
  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  border-radius:24px;

  overflow:hidden;

  transition:.3s;
}

.product-card:hover{
  transform:translateY(-5px);
}

.product-image{
  width:100%;
  height:220px;

  background:rgba(255,255,255,.04);

  display:flex;
  align-items:center;
  justify-content:center;
}

.product-image img{
  width:80%;
  height:80%;
  object-fit:contain;
}

.product-content{
  padding:18px;
}

.product-category{
  font-size:11px;
  font-weight:700;
  letter-spacing:.5px;

  color:var(--gold);

  margin-bottom:8px;
}

.product-name{
  font-size:16px;
  font-weight:700;
  line-height:1.5;

  min-height:48px;
}

.price-row{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;

  margin:16px 0;
}

.sp{
  font-size:24px;
  font-weight:800;
  color:var(--green);
}

.mp{
  font-size:13px;
  color:var(--muted);
  text-decoration:line-through;
}

.discount{
  font-size:13px;
  font-weight:700;
  color:var(--red);
}

.card-buttons{
  display:flex;
  gap:10px;
}

.card-buttons button{
  flex:1;

  border:none;

  padding:12px;

  border-radius:14px;

  font-weight:700;

  cursor:pointer;

  transition:.25s;
}

.edit-btn{
  background:linear-gradient(135deg,var(--primary),#2563eb);
  color:white;
}

.delete-btn{
  background:linear-gradient(135deg,#ff4d6d,#ff758f);
  color:white;
}

.card-buttons button:hover{
  transform:translateY(-2px);
}

.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}

@media(max-width:700px){

  .section-top{
    flex-direction:column;
    align-items:stretch;
  }

  .search-box{
    width:100%;
  }

  .products-grid{
    grid-template-columns:repeat(2,1fr);
  }

}

</style>
</head>

<body>

<nav>

  <div class="logo">
    Balaji <span>Mega Mart</span> Admin
  </div>

  <button class="back-btn" onclick="goHome()">
    <i class="fa fa-house"></i>
    Home
  </button>

</nav>

<div class="container">

  <div class="top-grid">

    <!-- ================= FORM ================= -->

    <div class="form-card">

      <div class="form-title">
        Add / Edit Product
      </div>

      <div class="form-sub">
        Add new grocery items or edit existing ones instantly.
      </div>

      <!-- ================= IMAGE PREVIEW ================= -->

      <div class="image-preview" id="imagePreview">

        <img
          id="previewImg"
          src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png"
        >

      </div>

      <!-- ================= IMAGE URL ================= -->

      <div class="input-box">

        <label>
          Product Image URL
        </label>

        <input
          type="text"
          id="image"
          placeholder="Paste image URL"
          oninput="previewImage()"
        >

      </div>

      <!-- ================= IMAGE UPLOAD ================= -->

      <div class="input-box">

        <label>
          Upload Image From Device
        </label>

        <input
          type="file"
          id="imageUpload"
          accept="image/*"
          onchange="uploadImage(event)"
          style="
            padding:12px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.08);
            border-radius:16px;
            color:white;
            width:100%;
          "
        >

      </div>

      <div class="input-box">

        <label>
          Product Name
        </label>

        <input
          type="text"
          id="name"
          placeholder="Enter product name"
        >

      </div>

      <div class="price-grid">

        <div class="input-box">

          <label>
            MP / MRP
          </label>

          <input
            type="number"
            id="mrp"
            placeholder="299"
            oninput="calculateDiscount()"
          >

        </div>

        <div class="input-box">

          <label>
            SP / Selling Price
          </label>

          <input
            type="number"
            id="price"
            placeholder="199"
            oninput="calculateDiscount()"
          >

        </div>

      </div>

      <div class="input-box">

        <label>
          Product Rating
        </label>

        <input
          type="number"
          id="rating"
          placeholder="4.5"
          step="0.1"
        >

      </div>

      <div class="input-box">

        <label>
          Category
        </label>

        <input
          type="text"
          id="category"
          placeholder="Fruits, Snacks, Dairy..."
        >

      </div>

      <div class="discount-box">

        <h3>
          Discount Percentage
        </h3>

        <p id="discountPreview">
          0% OFF
        </p>

      </div>

      <div class="action-buttons">

        <button
          class="save-btn"
          onclick="saveProduct()"
        >
          Save Product
        </button>

        <button
          class="clear-btn"
          onclick="clearForm()"
        >
          Clear
        </button>

      </div>

    </div>

    <!-- ================= PRODUCTS ================= -->

    <div class="products-section">

      <div class="section-top">

        <h2>
          All Products
        </h2>

        <div class="search-box">

          <i class="fa fa-search"></i>

          <input
            type="text"
            placeholder="Search products..."
            id="searchInput"
            oninput="searchProducts()"
          >

        </div>

      </div>

      <div
        class="products-grid"
        id="productsGrid"
      ></div>

    </div>

  </div>

</div>
<script>

/* ================= SUPABASE ================= */

const supabaseUrl =
'https://bjmsrqdptzxeykwvlqp.supabase.co';

const supabaseKey =
'YOUR_ANON_PUBLIC_KEY';

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

/* ================= DATA ================= */

let products = [];

let editId = null;

/* ================= IMAGE PREVIEW ================= */

function previewImage(){

  const file =
  document.getElementById("imageUpload").files[0];

  if(file){

    const reader = new FileReader();

    reader.onload = function(e){

      document.getElementById(
        "previewImg"
      ).src = e.target.result;
    };

    reader.readAsDataURL(file);
  }
}

/* ================= DISCOUNT ================= */

function calculateDiscount(){

  let mrp =
  Number(document.getElementById("mrp").value);

  let price =
  Number(document.getElementById("price").value);

  if(mrp > 0 && price > 0){

    let discount =
    Math.round(
      ((mrp - price) / mrp) * 100
    );

    document.getElementById(
      "discountPreview"
    ).innerText =
    discount + "% OFF";

  }else{

    document.getElementById(
      "discountPreview"
    ).innerText =
    "0% OFF";
  }
}

/* ================= SAVE PRODUCT ================= */

async function saveProduct(){

  let name =
  document.getElementById("name").value;

  let mrp =
  document.getElementById("mrp").value;

  let price =
  document.getElementById("price").value;

  let rating =
  document.getElementById("rating").value || 4.5;

  let category =
  document.getElementById("category").value;

  let file =
  document.getElementById("imageUpload").files[0];

  if(
    !file ||
    !name ||
    !mrp ||
    !price ||
    !category
  ){

    alert("Please fill all required fields");

    return;
  }

  try{

    let fileName =
    `${Date.now()}-${file.name}`;

    /* ===== UPLOAD IMAGE ===== */

    const {
      error: uploadError
    } = await supabaseClient
      .storage
      .from('products')
      .upload(fileName, file);

    if(uploadError){

      console.log(uploadError);

      alert("Image upload failed");

      return;
    }

    /* ===== GET IMAGE URL ===== */

    const {
      data:urlData
    } = supabaseClient
      .storage
      .from('products')
      .getPublicUrl(fileName);

    const imageUrl =
    urlData.publicUrl;

    /* ===== INSERT PRODUCT ===== */

    const {
      error: insertError
    } = await supabaseClient
      .from('products')
      .insert([
        {
          name:name,
          image:imageUrl,
          mrp:Number(mrp),
          sp:Number(price),
          category:category,
          rating:Number(rating)
        }
      ]);

    if(insertError){

      console.log(insertError);

      alert("Product save failed");

      return;
    }

    alert("Product Added Successfully");

    clearForm();

    loadProducts();

  }catch(err){

    console.log(err);

    alert("Something went wrong");
  }
}

/* ================= LOAD PRODUCTS ================= */

async function loadProducts(){

  const {
    data,
    error
  } = await supabaseClient
    .from('products')
    .select('*')
    .order('id', { ascending:false });

  if(error){

    console.log(error);

    return;
  }

  products = data || [];

  renderProducts();
}

/* ================= RENDER PRODUCTS ================= */

function renderProducts(list = products){

  const grid =
  document.getElementById("productsGrid");

  if(list.length === 0){

    grid.innerHTML =
    `
    <div class="empty">
      No products added yet
    </div>
    `;

    return;
  }

  grid.innerHTML = "";

  list.forEach(p => {

    let discount =
    Math.round(
      ((p.mrp - p.sp) / p.mrp) * 100
    );

    grid.innerHTML += `

    <div class="product-card">

      <div class="product-image">

        <img src="${p.image}">

      </div>

      <div class="product-content">

        <div class="product-category">
          ${p.category}
        </div>

        <div class="product-name">
          ${p.name}
        </div>

        <div class="price-row">

          <div>

            <div class="sp">
              ₹${p.sp}
            </div>

            <div class="mp">
              ₹${p.mrp}
            </div>

          </div>

          <div class="discount">
            ${discount}% OFF
          </div>

        </div>

        <div class="card-buttons">

          <button
            class="delete-btn"
            onclick="deleteProduct(${p.id})"
          >
            <i class="fa fa-trash"></i>
            Delete
          </button>

        </div>

      </div>

    </div>
    `;
  });
}

/* ================= DELETE ================= */

async function deleteProduct(id){

  let confirmDelete =
  confirm("Delete this product?");

  if(!confirmDelete) return;

  const {
    error
  } = await supabaseClient
    .from('products')
    .delete()
    .eq('id', id);

  if(error){

    console.log(error);

    alert("Delete failed");

    return;
  }

  loadProducts();
}

/* ================= CLEAR ================= */

function clearForm(){

  editId = null;

  document.getElementById("name").value = "";
  document.getElementById("mrp").value = "";
  document.getElementById("price").value = "";
  document.getElementById("rating").value = "";
  document.getElementById("category").value = "";
  document.getElementById("imageUpload").value = "";

  document.getElementById(
    "previewImg"
  ).src =
  "https://cdn-icons-png.flaticon.com/512/1046/1046857.png";

  document.getElementById(
    "discountPreview"
  ).innerText =
  "0% OFF";
}

/* ================= SEARCH ================= */

function searchProducts(){

  let value =
  document.getElementById("searchInput")
  .value
  .toLowerCase();

  let filtered =
  products.filter(p =>

    p.name.toLowerCase().includes(value)

    ||

    p.category.toLowerCase().includes(value)
  );

  renderProducts(filtered);
}

/* ================= ROUTING ================= */

function goHome(){

  window.location.href = "index.html";
}

/* ================= INIT ================= */

loadProducts();

  </script>

</body>
</html>
