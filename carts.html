<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Cart - Balaji Mega Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f6f8fb;
}

/* HEADER */
header{
  background:#0f2d4a;
  color:white;
  padding:18px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CART ITEM */
.container{
  width:90%;
  margin:25px auto;
}

.item{
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.item img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:10px;
}

.details{
  flex:1;
  margin-left:12px;
}

.price{
  color:#00a884;
  font-weight:600;
}

.qty{
  display:flex;
  align-items:center;
  gap:8px;
}

.qty button{
  width:28px;
  height:28px;
  border:none;
  background:#0f2d4a;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* SUMMARY */
.summary{
  background:white;
  padding:18px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.total{
  font-size:20px;
  font-weight:700;
  color:#ff8c42;
  margin:10px 0;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

/* WHATSAPP */
.whatsapp-btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  background:#25d366;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.empty{
  text-align:center;
  padding:60px 20px;
  color:#666;
}
</style>
</head>

<body>

<header>
  <h2>Your Cart</h2>
</header>

<div class="container" id="cartContainer"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* 🔥 FIX: group same items */
function groupCart(){

  let grouped = [];

  cart.forEach(item=>{

    let found = grouped.find(p=>p.id === item.id);

    if(found){
      found.qty += 1;
    } else {
      grouped.push({...item, qty:1});
    }
  });

  return grouped;
}

function save(cartData){
  localStorage.setItem("cart", JSON.stringify(cartData));
}

/* RENDER */
function render(){

  let container = document.getElementById("cartContainer");
  let grouped = groupCart();

  if(grouped.length === 0){
    container.innerHTML = `<div class="empty"><h2>Your cart is empty</h2></div>`;
    return;
  }

  container.innerHTML = "";

  grouped.forEach((item)=>{

    container.innerHTML += `
      <div class="item">
        <img src="${item.image}">

        <div class="details">
          <h3>${item.name}</h3>
          <div class="price">₹${item.price}</div>
          <div>Qty: ${item.qty}</div>
        </div>
      </div>
    `;
  });

  updateSummary(grouped);
}

/* TOTAL + WHATSAPP */
function updateSummary(items){

  let total = 0;

  items.forEach(i=>{
    total += i.price * i.qty;
  });

  let old = document.querySelector(".summary");
  if(old) old.remove();

  let div = document.createElement("div");
  div.className = "summary";

  div.innerHTML = `
    <h3>Order Summary</h3>
    <div class="total">Total: ₹${total}</div>

    <textarea id="address" placeholder="Enter address (optional)"></textarea>

    <button class="whatsapp-btn" onclick="sendWhatsApp(${total}, ${JSON.stringify(items).replace(/"/g,'&quot;')})">
      Order on WhatsApp
    </button>
  `;

  document.getElementById("cartContainer").appendChild(div);
}

/* WHATSAPP ORDER */
function sendWhatsApp(total, items){

  let number = "91XXXXXXXXXX"; // replace

  let address = document.getElementById("address").value;

  let msg = "🛒 *Balaji Mega Mart Order*%0A%0A";

  items.forEach(i=>{
    msg += `• ${i.name} x${i.qty} = ₹${i.price * i.qty}%0A`;
  });

  msg += `%0A💰 Total: ₹${total}%0A`;

  if(address){
    msg += `%0A📍 Address: ${address}%0A`;
  }

  window.open(`https://wa.me/${number}?text=${msg}`,"_blank");
}

render();

</script>

</body>
</html>
