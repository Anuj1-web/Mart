<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#07111f"/>

<title>Cart - Balaji Mega Mart</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07111f;
  --bg2:#0d1b2d;

  --text:#f4f7ff;
  --muted:#9ba8c7;

  --primary:#7c3aed;
  --primary2:#5b21b6;

  --gold:#f7c873;
  --green:#38d39f;

  --shadow:0 15px 35px rgba(0,0,0,.35);

  --line:rgba(255,255,255,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:
  radial-gradient(circle at top left,#1f1147 0%,transparent 30%),
  radial-gradient(circle at bottom right,#00354f 0%,transparent 30%),
  linear-gradient(135deg,var(--bg),var(--bg2));

  color:var(--text);

  min-height:100vh;

  overflow-x:hidden;
}

/* ================= NAV ================= */

nav{
  position:sticky;
  top:0;
  z-index:999;

  padding:16px 5%;

  display:flex;
  align-items:center;
  justify-content:space-between;

  background:rgba(7,17,31,.75);

  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--line);
}

.logo{
  font-size:24px;
  font-weight:800;
}

.logo span{
  background:linear-gradient(135deg,var(--gold),#ff9f43);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.back-btn{
  border:none;

  padding:12px 18px;

  border-radius:16px;

  background:
  linear-gradient(135deg,var(--primary),var(--primary2));

  color:white;

  font-weight:700;

  cursor:pointer;

  transition:.25s;
}

.back-btn:hover{
  transform:translateY(-2px);
}

/* ================= MAIN ================= */

.container{
  width:92%;
  max-width:1200px;
  margin:30px auto 120px;
}

/* ================= TITLE ================= */

.page-title{
  margin-bottom:25px;
}

.page-title h1{
  font-size:38px;
  margin-bottom:8px;
}

.page-title p{
  color:var(--muted);
}

/* ================= CART GRID ================= */

.cart-grid{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:24px;
}

@media(max-width:950px){

  .cart-grid{
    grid-template-columns:1fr;
  }

}

/* ================= CART ITEMS ================= */

.cart-items{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.item{
  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  border-radius:28px;

  padding:18px;

  display:flex;
  align-items:center;
  gap:18px;

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);

  transition:.3s;
}

.item:hover{
  transform:translateY(-4px);
}

.item-image{
  width:120px;
  height:120px;

  border-radius:22px;

  background:
  linear-gradient(
    145deg,
    rgba(255,255,255,.18),
    rgba(255,255,255,.05)
  );

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;

  flex-shrink:0;
}

.item-image img{
  width:82%;
  height:82%;
  object-fit:contain;
}

.item-details{
  flex:1;
}

.category{
  color:var(--gold);

  font-size:12px;
  font-weight:700;

  margin-bottom:6px;

  letter-spacing:.5px;
}

.item-name{
  font-size:18px;
  font-weight:700;

  line-height:1.5;

  margin-bottom:12px;
}

.price{
  color:var(--green);

  font-size:24px;
  font-weight:800;
}

/* ================= QTY ================= */

.item-actions{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:flex-end;
}

.qty{
  display:flex;
  align-items:center;
  gap:10px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  padding:6px;

  border-radius:16px;
}

.qty button{
  width:38px;
  height:38px;

  border:none;

  border-radius:12px;

  cursor:pointer;

  font-size:18px;
  font-weight:700;

  background:
  linear-gradient(135deg,var(--gold),#ff9f43);

  color:#111827;

  transition:.25s;
}

.qty button:hover{
  transform:scale(1.05);
}

.qty span{
  min-width:20px;
  text-align:center;

  font-size:16px;
  font-weight:700;
}

.remove-btn{
  border:none;

  padding:12px 16px;

  border-radius:14px;

  cursor:pointer;

  font-weight:700;

  background:
  linear-gradient(135deg,#ff4d6d,#ff758f);

  color:white;

  transition:.25s;
}

.remove-btn:hover{
  transform:translateY(-2px);
}

/* ================= SUMMARY ================= */

.summary{
  position:sticky;
  top:100px;

  height:fit-content;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  border-radius:30px;

  padding:26px;

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);
}

.summary h2{
  font-size:28px;
  margin-bottom:25px;
}

.summary-row{
  display:flex;
  justify-content:space-between;

  margin-bottom:16px;

  color:var(--muted);
}

.summary-total{
  margin-top:22px;
  padding-top:20px;

  border-top:1px solid rgba(255,255,255,.08);

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.summary-total h3{
  font-size:18px;
}

.summary-total span{
  font-size:32px;
  font-weight:800;
  color:var(--green);
}

/* ================= PROFILE ================= */

.profile-box{
  margin-top:28px;

  padding:18px;

  border-radius:20px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.06);
}

.profile-box h3{
  margin-bottom:14px;
}

.profile-detail{
  margin-bottom:10px;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

/* ================= BUTTON ================= */

.whatsapp-btn{
  width:100%;

  margin-top:24px;

  border:none;

  padding:16px;

  border-radius:18px;

  cursor:pointer;

  font-size:16px;
  font-weight:800;

  background:
  linear-gradient(135deg,#25d366,#1ebe5d);

  color:white;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;

  transition:.3s;
}

.whatsapp-btn:hover{
  transform:translateY(-3px);
}

/* ================= EMPTY ================= */

.empty{
  text-align:center;

  padding:100px 20px;
}

.empty i{
  font-size:80px;

  margin-bottom:20px;

  color:rgba(255,255,255,.2);
}

.empty h2{
  font-size:34px;
  margin-bottom:10px;
}

.empty p{
  color:var(--muted);
}

.shop-btn{
  margin-top:28px;

  border:none;

  padding:14px 22px;

  border-radius:18px;

  background:
  linear-gradient(135deg,var(--gold),#ff9f43);

  color:#111827;

  font-weight:800;

  cursor:pointer;
}

/* ================= MOBILE ================= */

@media(max-width:700px){

  .item{
    flex-direction:column;
    align-items:flex-start;
  }

  .item-actions{
    width:100%;
    flex-direction:row;
    justify-content:space-between;
    align-items:center;
  }

  .page-title h1{
    font-size:30px;
  }

}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

  <div class="logo">
    Balaji <span>Mega Mart</span>
  </div>

  <button class="back-btn" onclick="goBack()">
    <i class="fa fa-arrow-left"></i>
    Back
  </button>

</nav>

<!-- ================= MAIN ================= -->

<div class="container">

  <div class="page-title">

    <h1>
      Your Cart
    </h1>

    <p>
      Review your selected grocery items before placing your order.
    </p>

  </div>

  <div id="cartContent"></div>

</div>

<script>

/* ================= DATA ================= */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let profile =
JSON.parse(localStorage.getItem("profile")) || {};

/* ================= RENDER ================= */

function renderCart(){

  const content =
  document.getElementById("cartContent");

  if(cart.length === 0){

    content.innerHTML = `

    <div class="empty">

      <i class="fa fa-cart-shopping"></i>

      <h2>
        Your Cart is Empty
      </h2>

      <p>
        Add some delicious groceries to continue shopping.
      </p>

      <button
        class="shop-btn"
        onclick="goBack()"
      >
        Continue Shopping
      </button>

    </div>
    `;

    return;
  }

  let total = 0;

  let itemsHTML = "";

  cart.forEach((item,index)=>{

    total += item.price * item.qty;

    itemsHTML += `

    <div class="item">

      <div class="item-image">

        <img src="${item.image}">

      </div>

      <div class="item-details">

        <div class="category">
          ${item.category || "Grocery"}
        </div>

        <div class="item-name">
          ${item.name}
        </div>

        <div class="price">
          ₹${item.price}
        </div>

      </div>

      <div class="item-actions">

        <div class="qty">

          <button onclick="decrease(${index})">
            -
          </button>

          <span>
            ${item.qty}
          </span>

          <button onclick="increase(${index})">
            +
          </button>

        </div>

        <button
          class="remove-btn"
          onclick="removeItem(${index})"
        >
          <i class="fa fa-trash"></i>
        </button>

      </div>

    </div>
    `;
  });

  content.innerHTML = `

  <div class="cart-grid">

    <div class="cart-items">

      ${itemsHTML}

    </div>

    <div class="summary">

      <h2>
        Order Summary
      </h2>

      <div class="summary-row">
        <span>Items</span>
        <span>${cart.length}</span>
      </div>

      <div class="summary-row">
        <span>Total Quantity</span>
        <span>
          ${cart.reduce((a,b)=>a+b.qty,0)}
        </span>
      </div>

      <div class="summary-total">

        <h3>
          Total
        </h3>

        <span>
          ₹${total}
        </span>

      </div>

      <div class="profile-box">

        <h3>
          Delivery Details
        </h3>

        <div class="profile-detail">
          👤 ${profile.name || "No Name Added"}
        </div>

        <div class="profile-detail">
          📞 ${profile.mobile || "No Mobile Added"}
        </div>

        <div class="profile-detail">
          📧 ${profile.email || "No Email Added"}
        </div>

        <div class="profile-detail">
          📍 ${profile.address || "No Address Added"}
        </div>

      </div>

      <button
        class="whatsapp-btn"
        onclick="sendWhatsApp(${total})"
      >

        <i class="fab fa-whatsapp"></i>

        Order on WhatsApp

      </button>

    </div>

  </div>
  `;
}

/* ================= INCREASE ================= */

function increase(index){

  cart[index].qty++;

  saveCart();
}

/* ================= DECREASE ================= */

function decrease(index){

  if(cart[index].qty > 1){

    cart[index].qty--;

  }else{

    removeItem(index);

    return;
  }

  saveCart();
}

/* ================= REMOVE ================= */

function removeItem(index){

  cart.splice(index,1);

  saveCart();
}

/* ================= SAVE ================= */

function saveCart(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  renderCart();
}

/* ================= WHATSAPP ================= */

function sendWhatsApp(total){

  let number =
  "917878426819";

  let message =
  `🛒 *New Order - Balaji Mega Mart*%0A%0A`;

  message +=
  `👤 *Customer Details*%0A`;

  message +=
  `Name: ${profile.name || "-"}%0A`;

  message +=
  `Mobile: ${profile.mobile || "-"}%0A`;

  message +=
  `Email: ${profile.email || "-"}%0A`;

  message +=
  `Address: ${profile.address || "-"}%0A%0A`;

  message +=
  `🧾 *Ordered Items*%0A`;

  cart.forEach(item=>{

    message +=
    `• ${item.name} x${item.qty} = ₹${item.price * item.qty}%0A`;
  });

  message +=
  `%0A💰 *Grand Total: ₹${total}*`;

  let url =
  `https://wa.me/${number}?text=${message}`;

  window.open(url,"_blank");
}

/* ================= ROUTING ================= */

function goBack(){

  window.location.href = "index.html";
}

/* ================= INIT ================= */

renderCart();

</script>

</body>
</html>
```
