<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Cart - Balaji Mega Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f6f8fb;
}

/* HEADER */
header{
  background:#0f2d4a;
  color:white;
  padding:18px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CONTAINER */
.container{
  width:90%;
  margin:25px auto;
}

/* ITEM */
.item{
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.item img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:10px;
}

.details{
  flex:1;
  margin-left:12px;
}

.price{
  color:#00a884;
  font-weight:600;
}

/* QTY CONTROLS */
.qty{
  display:flex;
  align-items:center;
  gap:8px;
}

.qty button{
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#0f2d4a;
  color:white;
  font-size:16px;
}

/* REMOVE */
.remove{
  margin-left:8px;
  background:#ff4d4d;
  border:none;
  color:white;
  width:28px;
  height:28px;
  border-radius:6px;
  cursor:pointer;
}

/* SUMMARY */
.summary{
  background:white;
  padding:18px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.total{
  font-size:20px;
  font-weight:700;
  color:#ff8c42;
  margin:10px 0;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

.whatsapp-btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  background:#25d366;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:60px 20px;
}
</style>
</head>

<body>

<header>
  <h2>Your Cart</h2>
</header>

<div class="container" id="cartContainer"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ensure qty */
function normalize(){
  cart = cart.map(i => ({...i, qty: i.qty ? i.qty : 1}));
}

/* SAVE */
function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* INCREASE */
function increase(i){
  cart[i].qty++;
  save();
  render();
}

/* DECREASE */
function decrease(i){
  cart[i].qty--;
  if(cart[i].qty <= 0){
    cart.splice(i,1);
  }
  save();
  render();
}

/* REMOVE */
function removeItem(i){
  cart.splice(i,1);
  save();
  render();
}

/* RENDER */
function render(){

  normalize();

  let container = document.getElementById("cartContainer");

  if(cart.length === 0){
    container.innerHTML = `<div class="empty"><h2>Your cart is empty</h2></div>`;
    return;
  }

  container.innerHTML = "";

  cart.forEach((item,index)=>{

    container.innerHTML += `
      <div class="item">
        <img src="${item.image}">

        <div class="details">
          <h3>${item.name}</h3>
          <div class="price">₹${item.price}</div>
        </div>

        <div class="qty">
          <button onclick="decrease(${index})">-</button>
          <span>${item.qty}</span>
          <button onclick="increase(${index})">+</button>
        </div>

        <button class="remove" onclick="removeItem(${index})">
          <i class="fa fa-trash"></i>
        </button>
      </div>
    `;
  });

  updateSummary();
}

/* SUMMARY */
function updateSummary(){

  let total = 0;

  cart.forEach(i=>{
    total += i.price * i.qty;
  });

  let old = document.querySelector(".summary");
  if(old) old.remove();

  let div = document.createElement("div");
  div.className = "summary";

  div.innerHTML = `
    <h3>Order Summary</h3>
    <div class="total">Total: ₹${total}</div>

    <textarea id="address" placeholder="Enter address (optional)"></textarea>

    <button class="whatsapp-btn" onclick="sendWhatsApp(${total})">
      Order on WhatsApp
    </button>
  `;

  document.getElementById("cartContainer").appendChild(div);
}

/* WHATSAPP */
function sendWhatsApp(total){

  let number = "91XXXXXXXXXX"; // replace

  let address = document.getElementById("address").value;

  let msg = "🛒 *Balaji Mega Mart Order*%0A%0A";

  cart.forEach(i=>{
    msg += `• ${i.name} x${i.qty} = ₹${i.price * i.qty}%0A`;
  });

  msg += `%0A💰 Total: ₹${total}%0A`;

  if(address){
    msg += `%0A📍 Address: ${address}%0A`;
  }

  window.open(`https://wa.me/${number}?text=${msg}`,"_blank");
}

render();

</script>

</body>
</html>
