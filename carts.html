<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Cart - Balaji Mega Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f6f8fb;
  color:#1a1a1a;
}

/* HEADER */
header{
  background:#0f2d4a;
  color:white;
  padding:18px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:22px;
}

.back-btn{
  background:#ff8c42;
  color:white;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

/* CART CONTAINER */
.container{
  width:90%;
  margin:30px auto;
}

/* ITEM CARD */
.item{
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
}

.details{
  flex:1;
  margin-left:15px;
}

.details h3{
  font-size:16px;
}

.price{
  color:#00a884;
  font-weight:600;
  margin-top:5px;
}

/* QUANTITY CONTROLS */
.qty{
  display:flex;
  align-items:center;
  gap:10px;
}

.qty button{
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  background:#0f2d4a;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.qty span{
  font-weight:600;
}

/* REMOVE */
.remove{
  background:#ff4d4d;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-left:10px;
}

/* SUMMARY */
.summary{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
  margin-top:20px;
}

.summary h2{
  margin-bottom:10px;
  color:#0f2d4a;
}

.total{
  font-size:20px;
  font-weight:700;
  color:#ff8c42;
  margin:10px 0;
}

/* ADDRESS */
textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
  resize:none;
}

/* WHATSAPP BUTTON */
.whatsapp-btn{
  width:100%;
  margin-top:15px;
  padding:14px;
  background:#25d366;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:60px 20px;
  color:#666;
}

.empty i{
  font-size:60px;
  margin-bottom:15px;
  color:#ccc;
}

/* MOBILE */
@media(max-width:768px){
  .item{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  .qty{
    margin-top:10px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Your Cart</h1>
  <button class="back-btn" onclick="goBack()">← Back</button>
</header>

<div class="container" id="cartContainer"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

  const container = document.getElementById("cartContainer");

  if(cart.length === 0){
    container.innerHTML = `
      <div class="empty">
        <i class="fa fa-shopping-cart"></i>
        <h2>Your cart is empty</h2>
      </div>
    `;
    return;
  }

  container.innerHTML = "";

  cart.forEach((item,index)=>{

    if(!item.qty){
      item.qty = 1;
    }

    container.innerHTML += `
      <div class="item">
        <img src="${item.image}" />

        <div class="details">
          <h3>${item.name}</h3>
          <div class="price">₹${item.price}</div>
        </div>

        <div class="qty">
          <button onclick="decrease(${index})">-</button>
          <span>${item.qty}</span>
          <button onclick="increase(${index})">+</button>
        </div>

        <button class="remove" onclick="removeItem(${index})">
          <i class="fa fa-trash"></i>
        </button>
      </div>
    `;
  });

  updateTotal();
}

function increase(i){
  cart[i].qty++;
  save();
}

function decrease(i){
  if(cart[i].qty > 1){
    cart[i].qty--;
  } else {
    removeItem(i);
  }
  save();
}

function removeItem(i){
  cart.splice(i,1);
  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function updateTotal(){
  let total = 0;

  cart.forEach(item=>{
    total += item.price * item.qty;
  });

  let old = document.querySelector(".summary");
  if(old) old.remove();

  let summary = document.createElement("div");
  summary.className = "summary";

  summary.innerHTML = `
    <h2>Order Summary</h2>
    <div class="total">Total: ₹${total}</div>

    <textarea id="address" placeholder="Enter delivery address (optional)"></textarea>

    <button class="whatsapp-btn" onclick="sendWhatsApp(${total})">
      <i class="fab fa-whatsapp"></i> Order on WhatsApp
    </button>
  `;

  document.getElementById("cartContainer").appendChild(summary);
}

function sendWhatsApp(total){

  let number = "917878426819"; // 🔴 REPLACE WITH YOUR NUMBER

  let address = document.getElementById("address").value;

  let message = "🛒 *New Order from Balaji Mega Mart*%0A%0A";

  cart.forEach(item=>{
    message += `• ${item.name} x${item.qty} = ₹${item.price * item.qty}%0A`;
  });

  message += `%0A💰 *Total: ₹${total}*%0A`;

  if(address){
    message += `%0A📍 Address: ${address}%0A`;
  }

  let url = `https://wa.me/${number}?text=${message}`;

  window.open(url,"_blank");
}

function goBack(){
  window.location.href = "index.html";
}

renderCart();

</script>

</body>
</html>
